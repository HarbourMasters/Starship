name: GenerateBuilds

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-port-o2r:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0 # full history so the libultraship submodule gitlink (on a non-default branch of the fork) resolves
    - name: Install dependencies
      run: sudo apt-get install gcc g++ git cmake ninja-build lsb-release
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.14
      with:
        key: ${{ runner.os }}-o2r-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-o2r-ccache-${{ github.ref }}
          ${{ runner.os }}-o2r-ccache-
    - name: Cache build folders
      uses: actions/cache@v4
      with:
        key: ${{ runner.os }}-o2r-build-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-o2r-build-${{ github.ref }}
          ${{ runner.os }}-o2r-build-
        path: |
          tools/Torch/cmake-build-release
    - name: Generate starship.o2r
      run: |
        # Route the CMake-wrapped Torch build through ccache via env-var launchers
        # (honored by Ninja/Makefile generators regardless of /usr/lib/ccache symlinks).
        export CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        make -C tools/Torch type=release -j3
        tools/Torch/cmake-build-release/torch pack port starship.o2r o2r
    - uses: actions/upload-artifact@v4
      with:
        name: starship.o2r
        path: starship.o2r
        retention-days: 1

  build-windows:
    needs: generate-port-o2r
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the libultraship submodule gitlink (on a non-default branch of the fork) resolves
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Cache Vulkan SDK
        uses: actions/cache@v4
        with:
          key: windows-vulkan-sdk-v1
          path: C:\VulkanSDK
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          # Skip the (large) download+install when the cache already restored the SDK.
          if (-not (Test-Path "C:\VulkanSDK\Lib")) {
            $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe"
            Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\vulkan_sdk.exe"
            $p = Start-Process -FilePath "$env:RUNNER_TEMP\vulkan_sdk.exe" -ArgumentList "--root","C:\VulkanSDK","--accept-licenses","--default-answer","--confirm-command","install" -Wait -PassThru
            if ($p.ExitCode -ne 0) { throw "Vulkan SDK install failed with exit code $($p.ExitCode)" }
          }
          "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          key: windows-vcpkg-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            windows-vcpkg-${{ github.ref }}
            windows-vcpkg-
          path: |
            ~\AppData\Local\vcpkg\archives
      - name: sccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          variant: sccache
          key: windows-sccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            windows-sccache-${{ github.ref }}
            windows-sccache-
      - name: Build
        run: |
          # Use the runner's preinstalled vcpkg (blanking VCPKG_ROOT made automate-vcpkg
          # try to clone into an empty path and fail).
          $env:VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT
          # Ninja (single-config) so the compiler launcher works; sccache caches MSVC objects.
          # msvc-dev-cmd (arch x64) puts cl.exe on PATH; the x64-windows-static triplet is
          # set unconditionally in CMakeLists, so dropping -A x64 doesn't change it.
          cmake -S . -B "build/x64" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build ./build/x64 --parallel 10
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build/x64
      - name: Create Package
        run: |
          mkdir starship-release
          mv build/x64/Starship.exe starship-release/
          mv build/x64/starship.o2r starship-release/
          mv build/x64/.tcc starship-release/.tcc
          mv config.yml starship-release/
          mv assets starship-release/
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt" -OutFile "starship-release/gamecontrollerdb.txt"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: starship-windows
          path: starship-release

  build-macos:
    needs: generate-port-o2r
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the libultraship submodule gitlink (on a non-default branch of the fork) resolves
      - uses: melusina-org/setup-macports@v1
        with:
          parameters: '.github/macports.yml'
      - uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: macos # ccache-macos
      - name: Build
        run: |
          # MacPorts installs the (universal) Vulkan SDK under /opt/local; point the
          # build at it so find_package(Vulkan) + shaderc resolve and the Vulkan backend
          # is compiled into the universal binary.
          export VULKAN_SDK=/opt/local
          cmake -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE=Release -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build-cmake -j
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build-cmake
      - name: Create Package
        run: |
          cp -r build-cmake/.tcc .tcc
          (cd build-cmake && cpack)
          mv _packages/*.dmg Starship.dmg
          mv README.md readme.txt
      - name: Publish packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Starship-mac
          path: |
            Starship.dmg
            readme.txt
            .tcc

  build-linux:
    needs: generate-port-o2r
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the libultraship submodule gitlink (on a non-default branch of the fork) resolves
      - name: Update machine
        run: sudo apt update
      - name: Install dependencies
        run: sudo apt-get install gcc g++ git cmake ninja-build lsb-release libsdl2-dev libpng-dev libsdl2-net-dev libzip-dev zipcmp zipmerge ziptool nlohmann-json3-dev libtinyxml2-dev libspdlog-dev libboost-dev libopengl-dev libogg-dev libvorbis-dev libtcc-dev libvulkan-dev libshaderc-dev glslang-dev spirv-tools
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: linux-ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            linux-ccache-${{ github.ref }}
            linux-ccache-
      - name: Cache build folders
        uses: actions/cache@v4
        with:
          key: linux-build-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            linux-build-${{ github.ref }}
            linux-build-
          path: |
            SDL2-2.30.3
            tinyxml2-10.0.0
            libzip-1.10.1
      - name: Install latest SDL
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          if [ ! -d "SDL2-2.30.3" ]; then
            wget https://www.libsdl.org/release/SDL2-2.30.3.tar.gz
            tar -xzf SDL2-2.30.3.tar.gz
          fi
          cd SDL2-2.30.3
          ./configure --enable-hidapi-libusb
          make -j 10
          sudo make install
          sudo cp -av /usr/local/lib/libSDL* /lib/x86_64-linux-gnu/
      - name: Install latest tinyxml2
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          if [ ! -d "tinyxml2-10.0.0" ]; then
            wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
            tar -xzf 10.0.0.tar.gz
          fi
          cd tinyxml2-10.0.0
          mkdir -p build
          cd build
          cmake ..
          make
          sudo make install
      - name: Install libzip without crypto
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          if [ ! -d "libzip-1.10.1" ]; then
            wget https://github.com/nih-at/libzip/releases/download/v1.10.1/libzip-1.10.1.tar.gz
            tar -xzf libzip-1.10.1.tar.gz
          fi
          cd libzip-1.10.1
          mkdir -p build
          cd build
          cmake .. -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF
          make
          sudo make install
          sudo cp -av /usr/local/lib/libzip* /lib/x86_64-linux-gnu/
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build-cmake
      - name: Build
        run: |
          # Route the compiler through ccache so the linux-ccache cache is actually used.
          cmake -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE=Release -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build-cmake --config Release -j3
          (cd build-cmake && cpack -G External)
          wget -O gamecontrollerdb.txt https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt
          mv README.md readme.txt
          mv build-cmake/*.appimage starship.appimage
          cp -r build-cmake/.tcc .tcc
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Starship-linux
          path: |
            starship.appimage
            config.yml
            assets
            gamecontrollerdb.txt
            .tcc

  build-switch:
    needs: generate-port-o2r
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:20241023
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the libultraship submodule gitlink (on a non-default branch of the fork) resolves
      # ccache-action doesn't run cleanly inside the devkitpro container, so cache the
      # ccache dir directly (workspace-relative so host and container share it).
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          key: switch-ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            switch-ccache-${{ github.ref }}
            switch-ccache-
          path: |
            .ccache
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache
          sudo apt-get remove -y cmake
          git -C libultraship remote add nx https://github.com/Net64DD/libultraship.git
          git -C libultraship fetch nx
          git -C libultraship checkout nx/main-nx-nightly
          wget https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.sh -O /tmp/cmake.sh
          sudo sh /tmp/cmake.sh --prefix=/usr/local/ --exclude-subdir
          # Route the devkitA64 cross-compiler through ccache; CCACHE_DIR is workspace-relative
          # so the cached dir restored on the host is visible inside the container.
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          cmake -H. -Bbuild-switch -GNinja -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build-switch --config Release -j3
          wget -O gamecontrollerdb.txt https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt
          mv README.md readme.txt
          mv build-switch/*.nro Starship.nro
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Starship-switch
          path: |
            Starship.nro
            config.yml
            assets
            gamecontrollerdb.txt